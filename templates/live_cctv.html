<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live CCTV - Cyber Watch</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ── Feed grid ── */
        .cctv-feeds-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(460px, 1fr));
            gap: 24px;
        }

        /* ── Feed card ── */
        .feed-card {
            background: var(--card-bg, #1a1a2e);
            border: 1px solid var(--border-color, #2a2a4a);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .feed-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color, #2a2a4a);
        }
        .feed-card-header h3 {
            margin: 0;
            font-size: 12px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-primary, #e0e0ff);
        }
        .live-indicator { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; letter-spacing: 1px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
        .dot.red  { background: #e74c3c; animation: blink 1s infinite; }
        .dot.grey { background: #444; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

        /* ── Video wrapper ── */
        .feed-img-wrap {
            position: relative;
            width: 100%;
            background: #080812;
            min-height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .feed-img-wrap img { width: 100%; height: auto; display: block; }
        .feed-overlay-status {
            position: absolute; bottom: 8px; left: 10px;
            font-size: 10px; color: rgba(255,255,255,0.5);
            background: rgba(0,0,0,0.55);
            padding: 2px 8px; border-radius: 4px;
            font-family: monospace;
        }
        .feed-error {
            color: #e74c3c; font-size: 13px;
            text-align: center; padding: 30px 20px; line-height: 1.7;
        }
        .feed-connecting {
            color: var(--text-muted, #666);
            font-size: 13px; padding: 30px; text-align: center;
        }

        /* ── Status panel (below video) ── */
        .status-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            background: var(--border-color, #2a2a4a);
            border-top: 1px solid var(--border-color, #2a2a4a);
        }
        .status-cell {
            background: var(--card-bg, #1a1a2e);
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .status-cell:last-child {
            /* motion cell spans full width */
            grid-column: 1 / -1;
            border-top: 1px solid var(--border-color, #2a2a4a);
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
        }
        .status-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted, #666);
            font-weight: 500;
        }
        .status-value {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary, #e0e0ff);
            line-height: 1.2;
        }
        .status-value.green  { color: #1db954; }
        .status-value.red    { color: #e74c3c; }
        .status-value.muted  { color: #555; font-size: 13px; font-weight: 500; }

        /* Motion row */
        .motion-row-left  { display: flex; flex-direction: column; gap: 3px; }
        .motion-row-right { flex-shrink: 0; }
        .motion-indicator {
            display: flex; align-items: center; gap: 7px;
            font-size: 13px; font-weight: 700;
        }
        .motion-dot { width: 9px; height: 9px; border-radius: 50%; background: #1db954; flex-shrink: 0; }
        .motion-dot.alert { background: #e74c3c; animation: blink 0.5s infinite; }
        .motion-timestamp {
            font-size: 10px;
            color: var(--text-muted, #666);
            font-family: monospace;
        }
        .clear-btn {
            background: rgba(255,255,255,0.07);
            border: 1px solid var(--border-color, #2a2a4a);
            border-radius: 5px;
            color: var(--text-muted, #888);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 4px 10px;
            cursor: pointer;
            text-transform: uppercase;
            transition: background 0.2s;
        }
        .clear-btn:hover { background: rgba(255,255,255,0.13); }
    </style>
</head>
<body>

<div class="dashboard">
    <aside class="sidebar">
        <div class="logo-area">
            <h1>CYBER<span class="logo-accent">WATCH</span></h1>
        </div>
        <div class="sidebar-clock"><div id="live-clock"></div></div>
        <nav>
            <a href="/dashboard">Dashboard</a>
            <a href="/live-cctv" class="active">Live CCTV</a>
            <a href="/threat-logs">Threat Logs</a>
            <a href="/analytics">Analytics</a>
        </nav>
        <div class="sidebar-footer"><a href="/logout">Logout</a></div>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <div class="topbar-left">
                <h2 class="page-title">Live CCTV Monitoring</h2>
                <p class="text-muted">Real-time IP camera surveillance — school network feed</p>
            </div>
            <div class="topbar-right">
                <div class="profile-box">
                    <span class="status-dot green"></span>
                    <span>{{ user | default('admin') }}</span>
                </div>
            </div>
        </header>

        <!-- ── Live Feed Grid ── -->
        <div id="feedsContainer">
            <p style="text-align:center;color:var(--text-muted,#888);padding:40px;">Loading cameras…</p>
        </div>
    </main>
</div>

<script src="{{ url_for('static', filename='dashboard.js') }}"></script>
<script>
// ============================================================
//  Hardcoded-camera CCTV viewer with per-camera status panel
// ============================================================

let feedIntervals = {};
let motionStates  = {};
let frameStats    = {};   // { width, height, fps, lastFrameTime, frameCount }

const REFRESH_MS       = 400;
const MOTION_THRESHOLD = 3.5;
const PIXEL_DIFF       = 20;

// ── Boot ─────────────────────────────────────────────────────────────────
async function init() {
    try {
        const r    = await fetch('/cctv-cameras');
        const data = await r.json();
        renderFeeds(data.cameras || []);
    } catch (e) {
        document.getElementById('feedsContainer').innerHTML =
            '<p style="color:#e74c3c;text-align:center;padding:40px;">Failed to load camera list.</p>';
    }
}

// ── Build feed cards ──────────────────────────────────────────────────────
function renderFeeds(cameras) {
    Object.values(feedIntervals).forEach(clearInterval);
    feedIntervals = {};
    motionStates  = {};
    frameStats    = {};

    const container = document.getElementById('feedsContainer');

    if (!cameras.length) {
        container.innerHTML =
            '<p style="text-align:center;color:var(--text-muted,#888);padding:40px;">No cameras configured.</p>';
        return;
    }

    container.innerHTML = '<div class="cctv-feeds-grid" id="feedsGrid"></div>';
    const grid = document.getElementById('feedsGrid');

    cameras.forEach((cam, i) => {
        motionStates[i] = { prevData: null, active: false, timeout: null, lastEventTime: null };
        frameStats[i]   = { width: 0, height: 0, fps: 0, frameCount: 0, lastSecond: Date.now() };

        grid.innerHTML += `
        <div class="feed-card" id="feedCard-${i}">

            <!-- Header -->
            <div class="feed-card-header">
                <h3>${escHtml(cam.name)}</h3>
                <div class="live-indicator">
                    <span class="dot grey" id="liveDot-${i}"></span>
                    <span id="liveLabel-${i}">CONNECTING</span>
                </div>
            </div>

            <!-- Video -->
            <div class="feed-img-wrap" id="feedWrap-${i}">
                <p class="feed-connecting">Connecting…</p>
                <canvas id="motionCanvas-${i}" style="display:none;"></canvas>
            </div>

            <!-- Status panel -->
            <div class="status-panel">

                <div class="status-cell">
                    <span class="status-label">Camera Status</span>
                    <span class="status-value muted" id="statStatus-${i}">CONNECTING</span>
                </div>

                <div class="status-cell">
                    <span class="status-label">AI Detection</span>
                    <span class="status-value muted" id="statAI-${i}">STANDBY</span>
                </div>

                <div class="status-cell">
                    <span class="status-label">Resolution</span>
                    <span class="status-value muted" id="statRes-${i}">—</span>
                </div>

                <div class="status-cell">
                    <span class="status-label">Frame Rate</span>
                    <span class="status-value muted" id="statFPS-${i}">—</span>
                </div>

                <!-- Motion row — spans both columns -->
                <div class="status-cell">
                    <div class="motion-row-left">
                        <span class="status-label">Motion Detection</span>
                        <div class="motion-indicator">
                            <span class="motion-dot" id="mDot-${i}"></span>
                            <span id="mLabel-${i}" style="color:#1db954;">INITIALIZING…</span>
                        </div>
                        <span class="motion-timestamp" id="mTime-${i}"></span>
                    </div>
                    <div class="motion-row-right">
                        <button class="clear-btn" onclick="clearMotion(${i})">CLEAR</button>
                    </div>
                </div>

            </div>
        </div>`;
    });

    setTimeout(() => cameras.forEach((_, i) => startFeed(i)), 50);
}

// ── Poll frames ───────────────────────────────────────────────────────────
function startFeed(i) {
    const proxyBase = `/cctv-proxy?index=${i}`;

    function pullFrame() {
        const img = new Image();
        const ts  = Date.now();

        img.onload = () => {
            const wrap  = document.getElementById(`feedWrap-${i}`);
            const dot   = document.getElementById(`liveDot-${i}`);
            const label = document.getElementById(`liveLabel-${i}`);
            if (!wrap) return;

            // First frame — build the img element
            let liveImg = document.getElementById(`liveImg-${i}`);
            if (!liveImg) {
                wrap.innerHTML = `
                    <img id="liveImg-${i}" style="width:100%;height:auto;display:block;">
                    <span class="feed-overlay-status" id="feedStatus-${i}"></span>
                    <canvas id="motionCanvas-${i}" style="display:none;"></canvas>`;
                liveImg = document.getElementById(`liveImg-${i}`);
            }

            liveImg.src = img.src;
            document.getElementById(`feedStatus-${i}`).textContent =
                new Date().toLocaleTimeString();
            dot.className    = 'dot red';
            label.textContent = 'LIVE';

            // Update status panel
            updateStats(i, img);
            runMotion(i, liveImg);
        };

        img.onerror = () => {
            const dot   = document.getElementById(`liveDot-${i}`);
            const label = document.getElementById(`liveLabel-${i}`);
            const wrap  = document.getElementById(`feedWrap-${i}`);
            if (!dot || !label) return;
            dot.className    = 'dot grey';
            label.textContent = 'OFFLINE';

            // Status panel — offline state
            const statStatus = document.getElementById(`statStatus-${i}`);
            const statAI     = document.getElementById(`statAI-${i}`);
            const statRes    = document.getElementById(`statRes-${i}`);
            const statFPS    = document.getElementById(`statFPS-${i}`);
            if (statStatus) { statStatus.textContent = 'OFFLINE'; statStatus.className = 'status-value red'; }
            if (statAI)     { statAI.textContent = 'INACTIVE';    statAI.className     = 'status-value muted'; }
            if (statRes)    { statRes.textContent  = '—';          statRes.className    = 'status-value muted'; }
            if (statFPS)    { statFPS.textContent  = '—';          statFPS.className    = 'status-value muted'; }

            if (!document.getElementById(`liveImg-${i}`) && wrap) {
                wrap.innerHTML =
                    '<p class="feed-error">⚠ Camera offline or unreachable.<br>' +
                    '<small style="color:#555;margin-top:6px;display:block;">' +
                    'Update the URL in app.py → CAMERAS.</small></p>';
            }
        };

        img.src = `${proxyBase}&_t=${ts}`;
    }

    pullFrame();
    feedIntervals[i] = setInterval(pullFrame, REFRESH_MS);
}

// ── Update Camera Status / Resolution / FPS cells ────────────────────────
function updateStats(i, img) {
    const stat = frameStats[i];
    if (!stat) return;

    // Resolution (from natural image size)
    const w = img.naturalWidth  || img.width;
    const h = img.naturalHeight || img.height;
    if (w && h) { stat.width = w; stat.height = h; }

    // FPS counter — frames in the last second
    stat.frameCount++;
    const now = Date.now();
    if (now - stat.lastSecond >= 1000) {
        stat.fps        = stat.frameCount;
        stat.frameCount = 0;
        stat.lastSecond = now;
    }

    const statStatus = document.getElementById(`statStatus-${i}`);
    const statAI     = document.getElementById(`statAI-${i}`);
    const statRes    = document.getElementById(`statRes-${i}`);
    const statFPS    = document.getElementById(`statFPS-${i}`);

    if (statStatus) { statStatus.textContent = 'ONLINE';  statStatus.className = 'status-value green'; }
    if (statAI)     { statAI.textContent = 'ACTIVE';      statAI.className     = 'status-value green'; }
    if (statRes && stat.width)  statRes.textContent  = `${stat.width}×${stat.height}`;
    if (statFPS && stat.fps)    statFPS.textContent  = `${stat.fps} FPS`;
    if (statRes)    statRes.className  = 'status-value';
    if (statFPS)    statFPS.className  = 'status-value';
}

// ── Motion detection ──────────────────────────────────────────────────────
function runMotion(i, imgEl) {
    const canvas = document.getElementById(`motionCanvas-${i}`);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    canvas.width = 160; canvas.height = 90;
    try {
        ctx.drawImage(imgEl, 0, 0, 160, 90);
        const frame = ctx.getImageData(0, 0, 160, 90);
        const state = motionStates[i];
        if (!state.prevData) { state.prevData = frame; return; }

        let diff = 0;
        for (let p = 0; p < frame.data.length; p += 4) {
            const d = (Math.abs(frame.data[p]   - state.prevData.data[p]) +
                       Math.abs(frame.data[p+1] - state.prevData.data[p+1]) +
                       Math.abs(frame.data[p+2] - state.prevData.data[p+2])) / 3;
            if (d > PIXEL_DIFF) diff++;
        }
        state.prevData = frame;
        setMotion(i, (diff / (160 * 90) * 100) > MOTION_THRESHOLD);
    } catch (e) { /* cross-origin handled by proxy */ }
}

function setMotion(i, detected) {
    const dot   = document.getElementById(`mDot-${i}`);
    const label = document.getElementById(`mLabel-${i}`);
    const tEl   = document.getElementById(`mTime-${i}`);
    const state = motionStates[i];
    if (!dot || !label) return;

    // First time we get a result — mark AI as initialized
    if (!state.initialized) {
        state.initialized = true;
        label.textContent = 'NO MOTION DETECTED';
        label.style.color = '#1db954';
        if (tEl) tEl.textContent = `${new Date().toLocaleTimeString()}  Motion detection system online`;
    }

    if (detected && !state.active) {
        state.active          = true;
        state.lastEventTime   = new Date();
        dot.className         = 'motion-dot alert';
        label.textContent     = 'MOTION DETECTED';
        label.style.color     = '#e74c3c';
        if (tEl) tEl.textContent = `${state.lastEventTime.toLocaleTimeString()}  Motion event triggered`;
    }
    if (detected && state.timeout) { clearTimeout(state.timeout); state.timeout = null; }
    if (!detected && state.active && !state.timeout) {
        state.timeout = setTimeout(() => {
            state.active      = false;
            state.timeout     = null;
            dot.className     = 'motion-dot';
            label.textContent = 'NO MOTION DETECTED';
            label.style.color = '#1db954';
            if (tEl && state.lastEventTime)
                tEl.textContent = `${state.lastEventTime.toLocaleTimeString()}  Last motion event`;
        }, 1500);
    }
}

function clearMotion(i) {
    const state = motionStates[i];
    if (!state) return;
    state.active  = false;
    state.prevData = null;
    if (state.timeout) { clearTimeout(state.timeout); state.timeout = null; }
    const dot   = document.getElementById(`mDot-${i}`);
    const label = document.getElementById(`mLabel-${i}`);
    const tEl   = document.getElementById(`mTime-${i}`);
    if (dot)   dot.className     = 'motion-dot';
    if (label) { label.textContent = 'NO MOTION DETECTED'; label.style.color = '#1db954'; }
    if (tEl)   tEl.textContent   = `${new Date().toLocaleTimeString()}  Cleared by operator`;
}

function escHtml(s) {
    return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
