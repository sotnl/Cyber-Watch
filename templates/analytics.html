<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="dashboard">

    <aside class="sidebar">

        <div class="logo-area">
            <h1>
                CYBER
            </h1>
            <h1 class="logo-accent">
                WATCH
            </h1>
        </div>

        <nav>
            <a href="/dashboard">Dashboard</a>
            <a href="/live-cctv">Live CCTV</a>
            <a href="/threat-logs">Threat Logs</a>
            <a href="/analytics" class="active">Analytics</a>
        </nav>

        <div class="sidebar-footer">
            <a href="/logout">Logout</a>
        </div>

    </aside>

    <main class="main-content">

        <div class="topbar">

            <div class="topbar-left">

                <h2>Security Command Center</Command></h2>

                <p id="system-status">
                    AI Surveillance Active • Real-time Monitoring Enabled
                </p>

            </div>

            <div class="topbar-right">

                <div class="profile-box">
                    <div class="status-dot"></div>
                    <span>{{ user }}</span>
                </div>

                <div id="live-clock"></div>

            </div>

        </div>

        <div class="analytics-grid">

            <div class="analytics-card">
                <h3>Successful Logins</h3>
                <h1>{{ success_count }}</h1>
            </div>

            <div class="analytics-card">
                <h3>Failed Attempts</h3>
                <h1>{{ failed_count }}</h1>
            </div>

            <div class="analytics-card">
                <h3>Blocked IPs</h3>
                <h1>{{ blocked_count }}</h1>
            </div>

        </div>

        <div class="chart-container">
            <canvas id="securityChart"></canvas>
        </div>

    </main>

</div>

<script>

document.addEventListener("DOMContentLoaded", function(){

    const successCount = Number("{{ success_count }}");
    const failedCount = Number("{{ failed_count }}");
    const blockedCount = Number("{{ blocked_count }}");

    const canvas = document.getElementById("securityChart");

    if(!canvas){
        console.log("Canvas not found");
        return;
    }

    const ctx = canvas.getContext("2d");

    new Chart(ctx, {

        type: "bar",

        data: {

            labels: [
                "Success",
                "Failed",
                "Blocked"
            ],

            datasets: [{

                label: "Security Statistics",

                data: [
                    successCount,
                    failedCount,
                    blockedCount
                ],

                backgroundColor: [
                    "rgba(34,197,94,0.7)",
                    "rgba(239,68,68,0.7)",
                    "rgba(245,158,11,0.7)"
                ],

                borderColor: [
                    "#22c55e",
                    "#ef4444",
                    "#f59e0b"
                ],

                borderWidth: 2,

                borderRadius: 8
            }]
        },

        options: {

            responsive: true,

            plugins: {

                legend: {

                    labels: {
                        color: "white"
                    }
                }
            },

            scales: {

                y: {

                    beginAtZero: true,

                    ticks: {
                        color: "white"
                    },

                    grid: {
                        color: "rgba(255,255,255,.08)"
                    }
                },

                x: {

                    ticks: {
                        color: "white"
                    },

                    grid: {
                        color: "rgba(255,255,255,.08)"
                    }
                }
            }
        }
    });

});

</script>

</body>
</html>
